name = "miyabi-line-crm"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ============================================================
# PPAL向け設定
# ------------------------------------------------------------
# Secrets (set via `wrangler secret put`):
#   wrangler secret put API_KEY
#   wrangler secret put LINE_CHANNEL_SECRET
#   wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
#   wrangler secret put LINE_LOGIN_CHANNEL_SECRET
#
# Plain vars (set here or via Dashboard):
#   ALLOWED_ORIGINS — 管理画面のオリジン。例: "https://admin.yoursite.com"
#   ENABLE_STEALTH_MODE — "true" でゼロ幅文字挿入ON（デフォルト: 無効）
# ============================================================

[vars]
LIFF_URL           = "https://liff.line.me/2008491323-apEVKQYv"
LINE_CHANNEL_ID    = "2008348826"
LINE_LOGIN_CHANNEL_ID = "2008491323"
# ALLOWED_ORIGINS: 本番環境では管理画面URLをカンマ区切りで設定すること
# 例: "https://admin.miyabi-line.com,https://your-admin.pages.dev"
ALLOWED_ORIGINS    = "https://miyabi-line-admin.pages.dev"
ENABLE_STEALTH_MODE = "false"
WORKER_URL = "https://miyabi-line-crm.supernovasyun.workers.dev"
VERSION            = "0.3.0"
# PPAL Identity Hub — Phase 4 (Discord OAuth) placeholder vars.
# Set real values via `wrangler secret put DISCORD_CLIENT_SECRET` and
# update DISCORD_CLIENT_ID / LIFF_LINK_URL below before deploying Phase 4.
# Empty string here is intentional: Env type declares these as optional (?:string),
# so any code path reading them must guard against falsy/empty values.
DISCORD_CLIENT_ID  = ""
LIFF_LINK_URL      = ""

[[d1_databases]]
binding      = "DB"
database_name = "miyabi-line-crm"
database_id  = "2b9355ee-ddef-45d1-bca1-06a0a029ff83"

[triggers]
crons = ["*/5 * * * *"]

# Stripe プランの Price ID（wrangler secret put で設定推奨）
# STRIPE_PRO_PRICE_ID     = "price_xxx"   # Pro プラン ¥2,980/月
# STRIPE_BUSINESS_PRICE_ID = "price_xxx"  # Business プラン ¥9,800/月
# Secrets（wrangler secret put で設定）:
#   STRIPE_WEBHOOK_SECRET  — Stripe ダッシュボードの Webhook signing secret
#   STRIPE_SECRET_KEY      — Stripe Secret Key (sk_live_xxx / sk_test_xxx)
