name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. 型チェック
  # ─────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    outputs:
      error_log: ${{ steps.run.outputs.error_log }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build
      - id: run
        name: Typecheck worker
        run: |
          if ! pnpm --filter worker typecheck 2>&1 | tee /tmp/tc.log; then
            {
              echo 'error_log<<DELIM'
              grep -E "error TS|error:" /tmp/tc.log | head -30
              echo 'DELIM'
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Typecheck web
        run: pnpm --filter web typecheck
        continue-on-error: true

  # ─────────────────────────────────────────────
  # 2. ビルドチェック
  # ─────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    outputs:
      error_log: ${{ steps.run.outputs.error_log }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: run
        name: Build all packages
        run: |
          if ! pnpm -r build 2>&1 | tee /tmp/build.log; then
            {
              echo 'error_log<<DELIM'
              grep -E "error TS|error:|Error:" /tmp/build.log | head -30
              echo 'DELIM'
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # 3. 失敗キャッチ → Issue 自動作成 → Copilot / OpenClaw へディスパッチ
  # ─────────────────────────────────────────────
  notify-failure:
    name: Auto-fix Dispatch
    runs-on: ubuntu-latest
    needs: [typecheck, build]
    # typecheck か build が失敗したときだけ発火
    if: |
      always() &&
      (needs.typecheck.result == 'failure' || needs.build.result == 'failure')
    permissions:
      issues: write
      contents: read
    steps:
      # ── エラーログ付き Issue を作成し Copilot へアサイン ──────────────
      - name: Create Issue and assign to Copilot
        id: create_issue
        uses: actions/github-script@v7
        env:
          TYPECHECK_ERROR:  ${{ needs.typecheck.outputs.error_log }}
          BUILD_ERROR:      ${{ needs.build.outputs.error_log }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          BUILD_RESULT:     ${{ needs.build.result }}
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const sha7   = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // 失敗ジョブとエラーログを収集
            const failed = [];
            if (process.env.TYPECHECK_RESULT === 'failure') {
              failed.push({ job: 'Type Check',  log: process.env.TYPECHECK_ERROR });
            }
            if (process.env.BUILD_RESULT === 'failure') {
              failed.push({ job: 'Build Check', log: process.env.BUILD_ERROR });
            }

            const errorSections = failed.map(f => [
              `### ❌ ${f.job}`,
              '```',
              (f.log || '').trim() || '(ログ取得不可 — 下記 Actions Run URL を参照)',
              '```',
            ].join('\n')).join('\n\n');

            const body = [
              '## CI 自動修正依頼',
              '',
              '> このIssueはCI失敗を検知して自動作成されました。',
              '> Copilot Coding Agent が修正PRを作成します。',
              '',
              '| 項目 | 値 |',
              '|------|-----|',
              `| ブランチ | \`${branch}\` |`,
              `| コミット | \`${sha7}\` |`,
              `| 実行ログ | [Actions Run](${runUrl}) |`,
              '',
              '## エラー詳細',
              '',
              errorSections,
              '',
              '## 修正方針（Copilot への指示）',
              '1. 上記エラーを修正してください',
              '2. `pnpm install --frozen-lockfile && pnpm -r build` が通ることを確認',
              '3. `pnpm --filter worker typecheck` が通ることを確認',
              '4. 修正PRを作成してください',
            ].join('\n');

            // 同一ブランチの未クローズ Issue があればコメント追記（重複防止）
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'ci-failure',
              state:  'open',
            });
            const dup = existing.data.find(i =>
              i.title.includes('[CI Failure]') && i.title.includes(branch)
            );

            let issueNumber;
            if (dup) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: dup.number,
                body: `## 再発 (${sha7})\n\n${errorSections}\n\n[実行ログ](${runUrl})`,
              });
              issueNumber = dup.number;
              console.log(`Updated existing issue #${dup.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner:     context.repo.owner,
                repo:      context.repo.repo,
                title:     `[CI Failure] ${context.workflow} — ${branch} (${sha7})`,
                body,
                labels:    ['ci-failure', 'bug', 'auto'],   // 'auto' = OpenClaw pipeline も起動
                assignees: ['Copilot'],                      // GitHub Copilot Coding Agent
              });
              issueNumber = issue.data.number;
              console.log(`Created issue #${issueNumber}: ${issue.data.html_url}`);
              core.setOutput('issue_number', String(issueNumber));
              core.setOutput('issue_url', issue.data.html_url);
            }

      # ── Telegram 通知（TELEGRAM_BOT_TOKEN シークレット設定時のみ） ───
      - name: Telegram notification
        if: env.BOT_TOKEN != ''
        env:
          BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_URL:    ${{ steps.create_issue.outputs.issue_url }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SHA7="${GITHUB_SHA:0:7}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG="🚨 CI 失敗: line-harness-oss
Branch: ${BRANCH} (${SHA7})
Log: ${RUN_URL}
Issue: ${ISSUE_URL:-作成済み}
→ Copilot が自動修正中"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null
