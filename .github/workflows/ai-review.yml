name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout base branch for DESIGN_CONSTRAINTS
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base-branch

      - name: Load DESIGN_CONSTRAINTS
        id: constraints
        run: |
          if [ -f "base-branch/DESIGN_CONSTRAINTS.md" ]; then
            {
              echo "CONSTRAINTS<<CONSTRAINTS_EOF"
              cat base-branch/DESIGN_CONSTRAINTS.md
              echo "CONSTRAINTS_EOF"
            } >> "$GITHUB_ENV"
          else
            echo "CONSTRAINTS=No design constraints defined." >> "$GITHUB_ENV"
          fi

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff

      - name: Run AI Review
        id: review
        run: |
          cat > /tmp/review_prompt.txt << 'PROMPT_EOF'
          You are a senior code reviewer. Review this PR diff against design constraints.

          Review Guidelines:
          - Start CRITICAL issues with "CRITICAL:"
          - Start warnings with "WARNING:"
          - CRITICAL: security vulnerabilities, auth issues, data loss, breaking changes
          - WARNING: code quality, style, minor bugs
          PROMPT_EOF

          echo "Design Constraints: ${CONSTRAINTS}" >> /tmp/review_prompt.txt
          echo "" >> /tmp/review_prompt.txt
          echo "PR Title: ${{ github.event.pull_request.title }}" >> /tmp/review_prompt.txt
          echo "PR Author: ${{ github.event.pull_request.user.login }}" >> /tmp/review_prompt.txt
          echo "" >> /tmp/review_prompt.txt
          echo "--- DIFF ---" >> /tmp/review_prompt.txt
          cat /tmp/pr.diff >> /tmp/review_prompt.txt

          REVIEW=""
          for TOKEN_VAR in CLAUDE_CODE_OAUTH_TOKEN_1 CLAUDE_CODE_OAUTH_TOKEN_2 CLAUDE_CODE_OAUTH_TOKEN_3; do
            TOK="${!TOKEN_VAR}"
            if [ -z "$TOK" ]; then
              continue
            fi
            REVIEW=$(ANTHROPIC_API_KEY="" CLAUDE_CODE_OAUTH_TOKEN="$TOK" CLAUDE_NO_ANALYTICS=1 \
              claude --print --model claude-opus-4-6 --no-session-persistence \
              < /tmp/review_prompt.txt 2>/tmp/claude_err.txt) && break
            echo "Token $TOKEN_VAR failed, trying next..."
          done

          if [ -z "$REVIEW" ]; then
            REVIEW="AI review unavailable: all tokens failed or not configured."
          fi

          # GitHub Reviews API body limit: ~65535 chars — truncate to 64000 to avoid HTTP 500
          if [ ${#REVIEW} -gt 64000 ]; then
            REVIEW="${REVIEW:0:64000}"$'\n\n...[review truncated due to GitHub API body limit]'
            echo "review_truncated=true" >> "$GITHUB_OUTPUT"
          else
            echo "review_truncated=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "REVIEW_BODY<<REVIEW_EOF"
            echo "$REVIEW"
            echo "REVIEW_EOF"
          } >> "$GITHUB_ENV"

          if echo "$REVIEW" | grep -q "^CRITICAL:"; then
            echo "has_critical=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_critical=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN_1: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          CLAUDE_CODE_OAUTH_TOKEN_3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}

      - name: Post review (request changes - CRITICAL found)
        if: steps.review.outputs.has_critical == 'true'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --request-changes --body "$REVIEW_BODY"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "needs-human"

      - name: Post review (approve - no CRITICAL)
        if: steps.review.outputs.has_critical == 'false'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "$REVIEW_BODY"
