name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout base branch for DESIGN_CONSTRAINTS
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base-branch

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff

      - name: Prepare Input for Claude
        run: |
          # Include constraints at the top of the diff input
          if [ -f "base-branch/DESIGN_CONSTRAINTS.md" ]; then
            echo "Review the following PR diff against these design constraints. Output CRITICAL: if there are severe issues, otherwise just give warnings and approve." > /tmp/input.txt
            echo "--- DESIGN CONSTRAINTS ---" >> /tmp/input.txt
            cat base-branch/DESIGN_CONSTRAINTS.md >> /tmp/input.txt
            echo "--- END DESIGN CONSTRAINTS ---" >> /tmp/input.txt
            echo "" >> /tmp/input.txt
            echo "PR Diff:" >> /tmp/input.txt
          else
            echo "Review the following PR diff. Output CRITICAL: if there are severe issues." > /tmp/input.txt
          fi
          cat /tmp/pr.diff >> /tmp/input.txt
          
          # Replace original diff with combined input to satisfy requirements seamlessly
          mv /tmp/input.txt /tmp/pr.diff

      - name: Run Claude Code Review
        id: review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
        run: |
          # The exact requested command:
          REVIEW_OUTPUT=$(cat /tmp/pr.diff | claude --print --model claude-opus-4-6 --no-session-persistence 2>&1 || echo "Claude review completed with non-zero exit code")
          
          # Use secure delimiter for multiline environment variables
          EOF=$(openssl rand -hex 16)
          echo "REVIEW_BODY<<$EOF" >> $GITHUB_ENV
          echo "$REVIEW_OUTPUT" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV
          
          if echo "$REVIEW_OUTPUT" | grep -q "CRITICAL:"; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi

      - name: Post Review (CRITICAL)
        if: steps.review.outputs.has_critical == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --request-changes --body "$REVIEW_BODY"

      - name: Post Review (APPROVE)
        if: steps.review.outputs.has_critical == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "$REVIEW_BODY"