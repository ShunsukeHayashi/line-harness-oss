name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # F5: Validate DESIGN_CONSTRAINTS.md changes
      - name: Validate DESIGN_CONSTRAINTS.md changes
        if: contains(github.event.pull_request.changed_files, 'DESIGN_CONSTRAINTS.md')
        run: |
          if ! grep -q "^##\|^-" DESIGN_CONSTRAINTS.md; then
            echo "ERROR: DESIGN_CONSTRAINTS.md must use ## headers and - list items"
            exit 1
          fi
          if grep -qi "trigger.*no\|no.*trigger" DESIGN_CONSTRAINTS.md; then
            if grep -rq "CREATE TRIGGER\|AFTER UPDATE\|BEFORE UPDATE" --include="*.sql" .; then
              echo "WARNING: DESIGN_CONSTRAINTS says no triggers, but SQL files contain trigger statements"
            fi
          fi

      - name: Checkout base branch for DESIGN_CONSTRAINTS
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base-branch

      - name: Load DESIGN_CONSTRAINTS.md
        id: constraints
        run: |
          if [ -f "base-branch/DESIGN_CONSTRAINTS.md" ]; then
            echo "constraints_exist=true" >> $GITHUB_OUTPUT
            echo "CONSTRAINTS<<EOF" >> $GITHUB_ENV
            cat base-branch/DESIGN_CONSTRAINTS.md >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "constraints_exist=false" >> $GITHUB_OUTPUT
            echo "CONSTRAINTS=No design constraints defined for this repository." >> $GITHUB_ENV
          fi

      # W1: Generate review prompt (if script exists)
      - name: Generate dynamic review prompt
        id: review_prompt
        run: |
          if [ -f "scripts/generate-review-prompt.sh" ]; then
            REVIEW_PROMPT=$(bash scripts/generate-review-prompt.sh)
            echo "REVIEW_PROMPT<<EOF" >> $GITHUB_ENV
            echo "$REVIEW_PROMPT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "has_prompt=true" >> $GITHUB_OUTPUT
          else
            echo "has_prompt=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect doc-only PR
        id: doc_check
        run: |
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files -q '.files[].path')
          DOC_ONLY=true
          while IFS= read -r file; do
            if [[ ! "$file" =~ \.(md|txt|rst|adoc)$ ]] && [[ ! "$file" =~ ^docs/ ]]; then
              DOC_ONLY=false
              break
            fi
          done <<< "$FILES"
          echo "doc_only=$DOC_ONLY" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Detect repository type
        id: repo_type
        run: |
          if [ -f "package.json" ] || [ -f "tsconfig.json" ] || [ -f "go.mod" ] || [ -f "Cargo.toml" ]; then
            echo "repo_type=code" >> $GITHUB_OUTPUT
          else
            echo "repo_type=knowledge" >> $GITHUB_OUTPUT
          fi

      - name: Reject doc-only PR in code repo
        if: steps.doc_check.outputs.doc_only == 'true' && steps.repo_type.outputs.repo_type == 'code'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --request-changes --body "**CRITICAL: Documentation-only PR in code repository**

This PR only modifies documentation files but is submitted to a code repository. Please include corresponding code changes."
          gh pr edit ${{ github.event.pull_request.number }} --add-label "needs-human"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      # C1: Install Claude Code CLI
      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code@latest

      # C3: Get PR diff via file (avoid arg length limit)
      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          echo "diff_path=/tmp/pr.diff" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      # W1: Run reviewer assignment agent if script exists
      - name: Run reviewer assignment agent
        id: reviewer_assign
        run: |
          if [ -f "scripts/reviewer-assignment-agent.sh" ]; then
            REVIEWER_ASSIGNMENT=$(bash scripts/reviewer-assignment-agent.sh /tmp/pr.diff)
            echo "REVIEWER_ASSIGNMENT<<EOF" >> $GITHUB_ENV
            echo "$REVIEWER_ASSIGNMENT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "has_assignment=true" >> $GITHUB_OUTPUT
          else
            echo "has_assignment=false" >> $GITHUB_OUTPUT
          fi

      # C1, C2, C3: Run Claude via stdin with 3-token fallback
      - name: Run AI Review with Claude Code
        id: review
        run: |
          SYSTEM_PROMPT="You are a senior code reviewer. Review this PR against design constraints.

${CONSTRAINTS}"

          USER_PROMPT="**PR Title:** ${{ github.event.pull_request.title }}
**Author:** ${{ github.event.pull_request.user.login }}

**Diff:**
$(cat /tmp/pr.diff)

**Review Guidelines:**
- CRITICAL: security vulnerabilities, auth issues, data loss, breaking changes
- WARNING: code quality, style, minor bugs

Output: Start issues with CRITICAL: or WARNING: Be specific."

          REVIEW_BODY=""
          EXIT_CODE=1

          for TOK_NUM in 1 2 3; do
            case $TOK_NUM in
              1) TOK="${CLAUDE_CODE_OAUTH_TOKEN_1:-}" ;;
              2) TOK="${CLAUDE_CODE_OAUTH_TOKEN_2:-}" ;;
              3) TOK="${CLAUDE_CODE_OAUTH_TOKEN_3:-}" ;;
            esac
            if [ -z "$TOK" ]; then continue; fi

            REVIEW_BODY=$(ANTHROPIC_API_KEY="" \
              CLAUDE_CODE_OAUTH_TOKEN="$TOK" \
              CLAUDE_NO_ANALYTICS=1 \
              echo "$USER_PROMPT" | claude \
                --model claude-opus-4-6 \
                --print \
                --no-session-persistence \
                --system-prompt "$SYSTEM_PROMPT" 2>/tmp/claude_stderr.txt)
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ] && [ -n "$REVIEW_BODY" ]; then
              echo "Token $TOK_NUM succeeded"
              break
            fi
            echo "Token $TOK_NUM failed, trying next..."
          done

          if [ $EXIT_CODE -ne 0 ] || [ -z "$REVIEW_BODY" ]; then
            REVIEW_BODY="AI review failed: all tokens exhausted or invalid"
          fi

          echo "REVIEW_BODY<<EOF" >> $GITHUB_ENV
          echo "$REVIEW_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          if echo "$REVIEW_BODY" | grep -q "CRITICAL:"; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN_1: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          CLAUDE_CODE_OAUTH_TOKEN_3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}
          GH_TOKEN: ${{ github.token }}

      - name: Post CRITICAL review (request changes)
        if: steps.review.outputs.has_critical == 'true'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --request-changes --body "$REVIEW_BODY"
          gh pr edit ${{ github.event.pull_request.number }} --add-label "needs-human"
        env:
          GH_TOKEN: ${{ github.token }}

      # P4: Cascade Routing - escalate Copilot failures to Claude Code
      - name: Cascade to Claude Code (self-hosted)
        if: steps.review.outputs.has_critical == 'true' && github.event.pull_request.user.login == 'Copilot'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['cascade-to-claude']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '🔄 **Cascade Routing**: Copilot implementation has CRITICAL issues. Escalating to Claude Code for fix.'
            });

      - name: Post WARNING-only review (approve)
        if: steps.review.outputs.has_critical == 'false'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "$REVIEW_BODY"
        env:
          GH_TOKEN: ${{ github.token }}
