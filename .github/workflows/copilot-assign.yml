name: Copilot Assign

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'copilot' ||
      github.event.label.name == 'atomic'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get default branch
        id: default_branch
        run: |
          DEFAULT_BRANCH=$(gh repo view ${{ github.repository }} --json defaultBranchRef -q .defaultBranchRef.name)
          echo "branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Load DESIGN_CONSTRAINTS.md
        id: constraints
        run: |
          if [ -f "DESIGN_CONSTRAINTS.md" ]; then
            echo "CONSTRAINTS<<EOF" >> $GITHUB_ENV
            cat DESIGN_CONSTRAINTS.md >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "CONSTRAINTS=No design constraints defined. Follow general best practices." >> $GITHUB_ENV
          fi

      - name: Get issue details
        id: issue
        run: |
          gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body -q .body > /tmp/issue_body.txt
          gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title -q .title > /tmp/issue_title.txt
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          cat /tmp/issue_body.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          cat /tmp/issue_title.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get repository ID
        id: repo_id
        run: |
          REPO_ID=$(gh api graphql -f query='
            query($owner: String!, $name: String!) {
              repository(owner: $owner, name: $name) { id }
            }' \
            -f owner="${{ github.repository_owner }}" \
            -f name="${{ github.event.repository.name }}" \
            -q .data.repository.id)
          echo "id=$REPO_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Assign GitHub Copilot via GraphQL
        run: |
          ISSUE_NODE_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} -q .node_id)

          cat > /tmp/instructions.txt << 'INSTRUCTIONS_EOF'
          Repository Design Constraints:
          INSTRUCTIONS_EOF
          echo "$CONSTRAINTS" >> /tmp/instructions.txt
          echo "" >> /tmp/instructions.txt
          echo "Task Instructions:" >> /tmp/instructions.txt
          cat /tmp/issue_body.txt >> /tmp/instructions.txt
          echo "" >> /tmp/instructions.txt
          cat >> /tmp/instructions.txt << 'IMPORTANT_EOF'
          Important:
          - Follow the design constraints above strictly
          - Create a new branch from the default branch
          - Implement the changes described in the issue
          - Write tests if applicable
          - Create a draft PR when complete
          IMPORTANT_EOF

          CUSTOM_INSTRUCTIONS=$(cat /tmp/instructions.txt)

          gh api graphql -f query='
            mutation($issueId: ID!, $repositoryId: ID!, $baseRef: String!, $customInstructions: String!) {
              replaceActorsForAssignable(input: {
                assignableId: $issueId
                actorLogins: []
                agentAssignment: {
                  targetRepositoryId: $repositoryId
                  baseRef: $baseRef
                  customInstructions: $customInstructions
                }
              }) {
                assignable {
                  ... on Issue { number title }
                }
              }
            }' \
            -f issueId="$ISSUE_NODE_ID" \
            -f repositoryId="${{ steps.repo_id.outputs.id }}" \
            -f baseRef="${{ steps.default_branch.outputs.branch }}" \
            -f customInstructions="$CUSTOM_INSTRUCTIONS"

          echo "GitHub Copilot assigned to issue #${{ github.event.issue.number }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment assignment confirmation
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "GitHub Copilot has been assigned to this issue. It will create a branch and draft PR when implementation is complete."
        env:
          GH_TOKEN: ${{ github.token }}
