name: Auto-trigger Copilot

# copilot ラベルが付いた Issue に /assign @copilot コメントを投稿してトリガーする。
# GitHub REST API の assignees: ['Copilot'] は copilot[bot] に効かないため、
# コメントベースのトリガーを使用する。
on:
  issues:
    types: [labeled, opened]

jobs:
  trigger:
    name: Trigger Copilot Coding Agent
    runs-on: ubuntu-latest
    # copilot ラベルが付いている Issue のみ対象
    if: contains(github.event.issue.labels.*.name, 'copilot')
    permissions:
      issues: write
    steps:
      - name: Check if already triggered
        id: check
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const comments = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              per_page:     50,
            });
            const already = comments.data.some(c =>
              c.body.includes('@github-copilot') || c.body.includes('Copilot Coding Agent')
            );
            return already ? 'yes' : 'no';

      - name: Post Copilot trigger comment
        if: steps.check.outputs.result == 'no'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '@github-copilot このIssueを実装してください。',
                '',
                '## 実装方針',
                '1. 上記の要件を満たすコードを実装する',
                '2. `pnpm --filter worker typecheck` がエラーなしで通ること',
                '3. `pnpm -r build` が成功すること',
                '4. 実装完了後に Draft PR を作成してレビューを依頼すること',
              ].join('\n'),
            });

            console.log(`Triggered Copilot on #${context.issue.number}`);
