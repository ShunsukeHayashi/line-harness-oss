name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    steps:
      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "pull_request_review" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --json number,headRefName --jq ".[] | select(.headRefName == \"${{ github.event.check_suite.head_branch }}\") | .number")
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check merge conditions
        id: check
        run: |
          PR_NUMBER=${{ steps.pr.outputs.number }}
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found"
            exit 0
          fi
          
          PR_DATA=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json state,mergeable,reviewDecision,statusCheckRollup,labels)
          
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')
          REVIEW_DECISION=$(echo "$PR_DATA" | jq -r '.reviewDecision')
          CHECKS_PASS=$(echo "$PR_DATA" | jq -r '[.statusCheckRollup[] | select(.conclusion != "SUCCESS" and .conclusion != "SKIPPED")] | length == 0')
          HAS_NEEDS_HUMAN=$(echo "$PR_DATA" | jq -r '[.labels[] | select(.name == "needs-human")] | length > 0')
          
          echo "State: $STATE"
          echo "Mergeable: $MERGEABLE"
          echo "Review Decision: $REVIEW_DECISION"
          echo "Checks Pass: $CHECKS_PASS"
          echo "Has needs-human: $HAS_NEEDS_HUMAN"
          
          if [ "$STATE" != "OPEN" ]; then
            echo "PR is not open"
            exit 0
          fi
          
          if [ "$HAS_NEEDS_HUMAN" == "true" ]; then
            echo "PR has needs-human label, skipping auto-merge"
            exit 0
          fi
          
          if [ "$MERGEABLE" == "MERGEABLE" ] && [ "$REVIEW_DECISION" == "APPROVED" ] && [ "$CHECKS_PASS" == "true" ]; then
            echo "can_merge=true" >> $GITHUB_OUTPUT
          else
            echo "can_merge=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Enable auto-merge via GraphQL
        if: steps.check.outputs.can_merge == 'true'
        run: |
          PR_NUMBER=${{ steps.pr.outputs.number }}
          
          PR_ID=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json id -q .id)
          
          gh api graphql -f query='
            mutation($pullRequestId: ID!) {
              enablePullRequestAutoMerge(input: {
                pullRequestId: $pullRequestId,
                mergeMethod: SQUASH
              }) {
                pullRequest {
                  id
                  number
                }
              }
            }' -f pullRequestId="$PR_ID"
          
          echo "Auto-merge enabled for PR #$PR_NUMBER"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Fallback manual merge
        if: steps.check.outputs.can_merge == 'true'
        run: |
          PR_NUMBER=${{ steps.pr.outputs.number }}
          
          sleep 10
          
          PR_STATE=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json state -q .state)
          
          if [ "$PR_STATE" == "OPEN" ]; then
            echo "Auto-merge did not trigger, performing manual squash merge"
            gh pr merge $PR_NUMBER --repo ${{ github.repository }} --squash --delete-branch
          else
            echo "PR already merged via auto-merge"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
