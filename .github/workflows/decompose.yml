name: Decompose Issue for Copilot

on:
  issues:
    types: [labeled]

jobs:
  decompose:
    name: Analyze & Decompose
    runs-on: ubuntu-latest
    if: github.event.label.name == 'copilot'
    permissions:
      issues: write
      contents: read

    steps:
      - name: Write issue data to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            fs.writeFileSync('/tmp/issue.json', JSON.stringify({
              number: issue.number,
              title:  issue.title,
              body:   issue.body || '(no description provided)',
            }));
            console.log(`Issue #${issue.number} written to /tmp/issue.json`);

      - name: Context Sufficiency Check
        id: context_check
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';
            const combined = title + '\n' + body;

            // Check for file paths (extensions)
            const codeFilePattern = /\.(ts|tsx|js|jsx|py|sh|sql|yml|yaml|json|go|rb|java|cpp|c|rs)\b/i;
            const hasFilePath = codeFilePattern.test(combined);

            // Check for DB/auth keywords
            const dbAuthPattern = /database|db\b|auth|oauth|jwt|token|password|secret|schema|migration/i;
            const hasDbAuth = dbAuthPattern.test(combined);

            // Check for DESIGN_CONSTRAINTS reference
            const hasDesignConstraints = /DESIGN_CONSTRAINTS/i.test(combined);

            const issues = [];

            // Rule 1: No file paths in code-related issue
            if (!hasFilePath) {
              issues.push('**Missing file paths**: This issue does not mention any specific code files. Copilot needs concrete file paths to produce working code.');
            }

            // Rule 2: DB/auth work without design constraints reference
            if (hasDbAuth && !hasDesignConstraints) {
              issues.push('**Missing design constraints**: This issue involves database/auth/security work but does not reference `DESIGN_CONSTRAINTS.md`.');
            }

            if (issues.length > 0) {
              // Post comment and remove copilot label
              const commentBody = [
                '## Context Sufficiency Check Failed',
                '',
                'This issue needs more context before Copilot can implement it:',
                '',
                ...issues.map(i => `- ${i}`),
                '',
                'Please update the issue with the missing information and re-add the `copilot` label.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody,
              });

              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'copilot',
              }).catch(() => {});

              core.setOutput('passed', 'false');
            } else {
              core.setOutput('passed', 'true');
            }

      - name: Checkout repository
        if: steps.context_check.outputs.passed == 'true'
        uses: actions/checkout@v4

      - name: Install Claude Code CLI
        if: steps.context_check.outputs.passed == 'true'
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Analyze granularity with Claude
        if: steps.context_check.outputs.passed == 'true'
        id: analyze
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body -q .body)
          ISSUE_TITLE=$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title -q .title)

          cat > /tmp/decompose_prompt.txt << 'PROMPT_EOF'
          You are a technical project manager. Analyze this GitHub issue and determine if it should be decomposed into sub-issues.

          Respond with JSON only:
          {
            "atomic": true/false,
            "reason": "brief explanation",
            "subtasks": ["subtask 1", "subtask 2"]
          }

          atomic=true means the issue is small enough for Copilot to implement in one PR.
          atomic=false means it should be split into smaller sub-issues.
          PROMPT_EOF

          echo "Issue Title: $ISSUE_TITLE" >> /tmp/decompose_prompt.txt
          echo "Issue Body: $ISSUE_BODY" >> /tmp/decompose_prompt.txt

          ANALYSIS=""
          for TOKEN_VAR in CLAUDE_CODE_OAUTH_TOKEN_1 CLAUDE_CODE_OAUTH_TOKEN_2 CLAUDE_CODE_OAUTH_TOKEN_3; do
            TOK="${!TOKEN_VAR}"
            if [ -z "$TOK" ]; then continue; fi
            ANALYSIS=$(ANTHROPIC_API_KEY="" CLAUDE_CODE_OAUTH_TOKEN="$TOK" CLAUDE_NO_ANALYTICS=1 \
              claude --print --model claude-opus-4-6 --no-session-persistence \
              < /tmp/decompose_prompt.txt 2>/dev/null) && break
          done

          if [ -z "$ANALYSIS" ]; then
            echo "Claude unavailable, defaulting to atomic=true"
            ANALYSIS='{"atomic":true,"reason":"Claude unavailable","subtasks":[]}'
          fi

          # Strip markdown code fences and compact to single-line JSON (avoids GITHUB_OUTPUT multiline issues)
          ANALYSIS_CLEAN=$(echo "$ANALYSIS" | python3 -c "import sys,json,re; t=sys.stdin.read().strip(); t=re.sub(r'^\x60{3}json\n?','',t); t=re.sub(r'\n?\x60{3}$','',t.strip()); obj=json.loads(t); print(json.dumps(obj))" 2>/dev/null || echo '{"atomic":true,"reason":"parse error","subtasks":[]}')
          echo "analysis=$ANALYSIS_CLEAN" >> $GITHUB_OUTPUT
        env:
          CLAUDE_CODE_OAUTH_TOKEN_1: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}
          CLAUDE_CODE_OAUTH_TOKEN_2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          CLAUDE_CODE_OAUTH_TOKEN_3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_3 }}
          GH_TOKEN: ${{ github.token }}

      - name: Handle decomposition result
        if: steps.context_check.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const analysisRaw = `${{ steps.analyze.outputs.analysis }}`;
            let analysis;
            try {
              analysis = JSON.parse(analysisRaw);
            } catch(e) {
              analysis = { atomic: true, reason: 'parse error', subtasks: [] };
            }

            const issue = context.payload.issue;

            if (analysis.atomic) {
              // Issue is atomic - add comment and let copilot-assign.yml handle it
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Issue analyzed: **atomic** (${analysis.reason}). Proceeding with Copilot assignment.`,
              });
            } else {
              // Decompose into sub-issues
              for (const subtask of (analysis.subtasks || [])) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: subtask,
                  body: `Sub-task decomposed from #${issue.number}: ${issue.title}\n\n_Auto-decomposed by Claude Opus_`,
                  labels: ['copilot'],
                });
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## Issue Decomposed\n\nThis issue was split into ${analysis.subtasks.length} sub-issues. Reason: ${analysis.reason}`,
              });
              // Remove copilot label from parent
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'copilot',
              }).catch(() => {});
            }
