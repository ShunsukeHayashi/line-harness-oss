name: Issue Decompose

on:
  issues:
    types: [labeled, opened]

permissions:
  contents: read
  issues: write

jobs:
  decompose:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'copilot' || contains(github.event.issue.labels.*.name, 'copilot')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # W3/W4: Get issue body via file (injection-safe)
      - name: Get issue details
        id: issue
        run: |
          gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body -q .body > /tmp/issue_body.txt
          gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title -q .title > /tmp/issue_title.txt
          
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          cat /tmp/issue_body.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          cat /tmp/issue_title.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Context Sufficiency Check
        id: context_check
        run: |
          HAS_FILE_PATHS=false
          if cat /tmp/issue_body.txt | grep -qE '(/|\.ts|\.js|\.py|\.go|\.rs|\.md|\.yml|\.yaml)'; then
            HAS_FILE_PATHS=true
          fi
          
          HAS_DB_OR_AUTH=false
          if cat /tmp/issue_body.txt | grep -qiE '(database|DB|SQL|auth|authentication|authorization|login|session|token|credential)'; then
            HAS_DB_OR_AUTH=true
          fi
          
          HAS_DESIGN_MENTION=false
          if cat /tmp/issue_body.txt | grep -qiE '(DESIGN_CONSTRAINTS|design constraint|architectural|security requirement)'; then
            HAS_DESIGN_MENTION=true
          fi
          
          CONTEXT_SUFFICIENT=true
          WARNINGS=""
          
          if [ "$HAS_FILE_PATHS" == "false" ]; then
            CONTEXT_SUFFICIENT=false
            WARNINGS="$WARNINGS
- ❌ No file paths or specific code locations mentioned"
          fi
          
          if [ "$HAS_DB_OR_AUTH" == "true" ] && [ "$HAS_DESIGN_MENTION" == "false" ]; then
            CONTEXT_SUFFICIENT=false
            WARNINGS="$WARNINGS
- ❌ Database/authentication changes mentioned without referencing DESIGN_CONSTRAINTS.md"
          fi
          
          echo "sufficient=$CONTEXT_SUFFICIENT" >> $GITHUB_OUTPUT
          echo "WARNINGS<<EOF" >> $GITHUB_ENV
          echo "$WARNINGS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Reject insufficient context
        if: steps.context_check.outputs.sufficient == 'false'
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "⚠️ **Context Sufficiency Check Failed**

This issue does not provide sufficient context for Copilot to implement safely.

**Issues found:**
$WARNINGS

**Required information:**
- Specific file paths to modify or create
- For database/auth changes: reference to DESIGN_CONSTRAINTS.md or security requirements
- Clear acceptance criteria with verifiable conditions

**Next steps:**
1. Update the issue with missing context
2. Re-add the \`copilot\` label to trigger assignment

The \`copilot\` label has been removed. Please address the issues above before re-applying."
          
          gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --remove-label "copilot"
          
          exit 0
        env:
          GH_TOKEN: ${{ github.token }}

      # C6: Install Claude Code CLI
      - name: Install Claude Code CLI
        if: steps.context_check.outputs.sufficient == 'true'
        run: |
          npm install -g @anthropic-ai/claude-code@latest

      # C6: Analyze granularity with proper Claude CLI syntax
      - name: Analyze granularity with Claude
        id: granularity
        if: steps.context_check.outputs.sufficient == 'true'
        run: |
          PROMPT="Analyze this GitHub issue for task granularity:

**Title:** $ISSUE_TITLE

**Body:**
$ISSUE_BODY

**Task:**
Determine if this issue is:
1. **atomic**: A single, well-defined change (1-3 files, clear scope)
2. **coarse**: Multiple independent changes that should be separate issues

**Output format:**
First line ONLY: \"atomic\" or \"coarse\"
If coarse, list 3-5 sub-tasks in this format:
- Sub-task title | affected files | acceptance criteria

Be concise and specific."

          ANALYSIS=$(echo "$PROMPT" | claude --print --model claude-opus-4-6 --no-session-persistence 2>&1 | head -20)
          EXIT_CODE=$?

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Claude analysis failed, defaulting to atomic"
            echo "granularity=atomic" >> $GITHUB_OUTPUT
          else
            FIRST_LINE=$(echo "$ANALYSIS" | head -1 | tr -d ' \n' | tr '[:upper:]' '[:lower:]')
            
            if [ "$FIRST_LINE" == "atomic" ]; then
              echo "granularity=atomic" >> $GITHUB_OUTPUT
            elif [ "$FIRST_LINE" == "coarse" ]; then
              echo "granularity=coarse" >> $GITHUB_OUTPUT
              echo "SUBTASKS<<EOF" >> $GITHUB_ENV
              echo "$ANALYSIS" | tail -n +2 >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            else
              echo "granularity=atomic" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_1 }}

      - name: Mark as atomic
        if: steps.granularity.outputs.granularity == 'atomic'
        run: |
          gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "atomic"
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "✅ **Granularity Check: Atomic**

This issue represents a single, well-scoped task. Proceeding with Copilot assignment."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Decompose coarse issue
        if: steps.granularity.outputs.granularity == 'coarse'
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "🔀 **Granularity Check: Coarse**

This issue contains multiple independent changes. Decomposing into sub-issues:

$SUBTASKS

Creating sub-issues now..."
          
          PARENT_ISSUE_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} -q .node_id)
          
          while IFS='|' read -r title files criteria; do
            if [ -n "$title" ] && [[ "$title" == *"-"* ]]; then
              title=$(echo "$title" | sed 's/^[[:space:]]*-[[:space:]]*//')
              files=$(echo "$files" | xargs)
              criteria=$(echo "$criteria" | xargs)
              
              SUB_BODY="**Parent Issue:** #${{ github.event.issue.number }}

**Affected Files:**
$files

**Acceptance Criteria:**
$criteria

**Context:**
This is a decomposed sub-task from a larger issue. Implements a single, atomic change."
              
              NEW_ISSUE=$(gh issue create --repo ${{ github.repository }} --title "$title" --body "$SUB_BODY" --label "copilot,decomposed")
              NEW_ISSUE_NUMBER=$(echo "$NEW_ISSUE" | grep -oE '[0-9]+$')
              NEW_ISSUE_ID=$(gh api repos/${{ github.repository }}/issues/$NEW_ISSUE_NUMBER -q .node_id)
              
              gh api graphql -f query='
                mutation($parentId: ID!, $childId: ID!) {
                  addSubIssue(input: {
                    parentId: $parentId
                    childId: $childId
                  }) {
                    parent {
                      number
                    }
                  }
                }' -f parentId="$PARENT_ISSUE_ID" -f childId="$NEW_ISSUE_ID"
              
              echo "Created sub-issue #$NEW_ISSUE_NUMBER"
            fi
          done <<< "$SUBTASKS"
          
          gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --remove-label "copilot" --add-label "decomposed"
          
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "✅ Decomposition complete. Sub-issues created and linked. This parent issue will be closed when all sub-issues are complete."
        env:
          GH_TOKEN: ${{ github.token }}
